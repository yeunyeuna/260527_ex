<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 병원 - 예약</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>행복한 고양이 병원</h1>
        <nav>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="products.html">상품</a></li>
                <li><a href="reservation.html" class="active">예약</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>진료 예약하기</h2>
            <p>편리한 온라인 예약으로 고양이의 건강을 지켜주세요.</p>
        </section>

        <section class="reservation-form">
            <h2 class="section-title">예약 정보 입력</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="ownerName">보호자 이름</label>
                    <input type="text" id="ownerName" name="ownerName" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label for="catName">고양이 이름</label>
                    <input type="text" id="catName" name="catName" required>
                </div>
                
                <div class="form-group">
                    <label for="catAge">고양이 나이</label
                    <input type="number" id="catAge" name="catAge" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="visitDate">희망 방문 날짜</label>
                    <input type="date" id="visitDate" name="visitDate" required>
                </div>
                
                <div class="form-group">
                    <label for="visitTime">희망 방문 시간</label>
                    <input type="time" id="visitTime" name="visitTime" required>
                </div>
                
                <div class="form-group">
                    <label for="visitType">진료 종류</label>
                    <select id="visitType" name="visitType" required>
                        <option value="">선택하세요</option>
                        <option value="general">일반 진료</option>
                        <option value="vaccination">예방접종</option>
                        <option value="checkup">건강검진</option>
                        <option value="surgery">수술 상담</option>
                        <option value="other">기타</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">특이사항 또는 메시지</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">예약하기</button>
            </form>
        </section>
        
        <section class="info">
            <h2 class="section-title">예약 안내</h2>
            <p>• 예약 후 확인 문자가 발송됩니다.</p>
            <p>• 방문 10분 전까지 도착해 주시기 바랍니다.</p>
            <p>• 진료 변경 또는 취소는 방문 24시간 전까지 가능합니다.</p>
            <p>• 응급 상황은 별도로 전화 문의해 주세요.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 행복한 고양이 병원. 연락처: 02-1234-5678</p>
    </footer>
</body>
</html>
