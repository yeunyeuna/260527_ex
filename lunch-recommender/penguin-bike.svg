<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle -->
  <!-- Wheels -->
  <circle cx="50" cy="150" r="20" stroke="black" stroke-width="2" fill="white"/>
  <circle cx="150" cy="150" r="20" stroke="black" stroke-width="2" fill="white"/>
  <!-- Frame -->
  <line x1="50" y1="150" x2="100" y2="100" stroke="black" stroke-width="2"/>  <!-- rear wheel to seat -->
  <line x1="100" y1="100" x2="150" y2="150" stroke="black" stroke-width="2"/>  <!-- seat to front wheel -->
  <!-- Seat post -->
  <line x1="100" y1="100" x2="100" y2="60" stroke="black" stroke-width="2"/>
  <!-- Seat -->
  <ellipse cx="100" cy="100" rx="10" ry="5" stroke="black" stroke-width="2" fill="red"/>
  <!-- Handlebars -->
  <line x1="100" y1="60" x2="100" y2="40" stroke="black" stroke-width="2"/>  <!-- stem -->
  <line x1="70" y1="40" x2="130" y2="40" stroke="black" stroke-width="2"/>  <!-- crossbar -->
  <!-- Pedals and bottom bracket -->
  <circle cx="100" cy="130" r="5" fill="black"/>  <!-- bottom bracket -->
  <circle cx="80" cy="130" r="5" fill="black"/>  <!-- left pedal -->
  <circle cx="120" cy="130" r="5" fill="black"/>  <!-- right pedal -->
  <!-- Penguin -->
  <!-- Body -->
  <ellipse cx="100" cy="80" rx="25" ry="20" fill="black"/>
  <!-- Belly -->
  <ellipse cx="100" cy="90" rx="15" ry="12" fill="white"/>
  <!-- Head -->
  <circle cx="100" cy="45" r="12" fill="black"/>
  <!-- Face -->
  <circle cx="100" cy="45" r="7" fill="white"/>
  <!-- Eyes -->
  <circle cx="97" cy="43" r="1.5" fill="black"/>
  <circle cx="103" cy="43" r="1.5" fill="black"/>
  <!-- Beak -->
  <polygon points="100,48 105,45 100,42" fill="orange"/>
  <!-- Flippers -->
  <line x1="85" y1="80" x2="70" y2="40" stroke="black" stroke-width="2"/>
  <line x1="115" y1="80" x2="130" y2="40" stroke="black" stroke-width="2"/>
  <!-- Feet and legs -->
  <line x1="90" y1="100" x2="80" y2="130" stroke="black" stroke-width="2"/>
  <line x1="110" y1="100" x2="120" y2="130" stroke="black" stroke-width="2"/>
</svg>